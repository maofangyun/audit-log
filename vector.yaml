## =============================================================
## Vector 配置 — Claim Check 模式（Java → 本地日志 → Vector → PostgreSQL）
## =============================================================

# ──────────────────────────────────────────────────────────────
# Source：监听 Java 应用写入的 JSON 日志文件
# ──────────────────────────────────────────────────────────────
sources:
  audit_logs:
    type: file
    include: ["/var/log/app/audit/*.log"]
    read_from: beginning
    data_dir: /var/lib/vector
    # 提升至 30MB，确保 11MB 原始数据 + 转义字符 + 外层 JSON 都能容纳
    max_line_bytes: 31457280

# ──────────────────────────────────────────────────────────────
# Transform：解析 JSON，识别大对象标志，整理字段映射
# ──────────────────────────────────────────────────────────────
transforms:
  parse:
    type: remap
    inputs: ["audit_logs"]
    # 即使解析出错也不要让整个 pipeline 停止
    drop_on_error: true 
    source: |
      # 尝试解析外层
      outer, err = parse_json(.message)
      if err != null {
        log("Outer JSON parse error: " + err, level: "warn")
        abort
      }

      # 尝试解析内层业务日志
      inner, err = parse_json(outer.message)
      if err != null {
        log("Inner JSON parse error (possibly truncated): " + err, level: "warn")
        abort
      }

      # ── 构造落库事件 ────────────────────────────────────────────
      new_event = {}
      new_event.id             = inner.id
      new_event.timestamp      = outer."@timestamp"
      new_event.trace_id       = inner.traceId
      new_event.user_id        = inner.userId
      new_event.action         = inner.action
      new_event.resource_type  = inner.resourceType
      new_event.resource_id    = inner.resourceId
      new_event.business_id    = inner.businessId
      new_event.status         = inner.status

      # ── Claim Check 识别：is_large_payload 字段 ─────────────────
      # 兼容多种 key 名称
      if exists(inner.largePayload) {
        new_event.is_large_payload = inner.largePayload
      } else if exists(inner.isLargePayload) {
        new_event.is_large_payload = inner.isLargePayload
      } else {
        new_event.is_large_payload = false
      }

      # ── details 字段处理 ─────────────────────────────────────────
      # 直接保留对象结构，Vector 的 postgres sink 会自动将其转为 JSONB 写入
      if exists(inner.details) && inner.details != null {
        new_event.details = inner.details
      } else {
        new_event.details = {}
      }

      # ── 替换当前事件 ────────────────────────────────────────────
      . = new_event

# ──────────────────────────────────────────────────────────────
# Sinks
# ──────────────────────────────────────────────────────────────
sinks:
  # 调试用：docker-compose logs vector-agent 可见干净 JSON
  console_out:
    type: console
    inputs: ["parse"]
    encoding:
      codec: json

  # 核心落库：PostgreSQL audit_logs 表
  pg_sink:
    type: postgres
    inputs: ["parse"]
    endpoint: "postgresql://audit_user:audit_pass@postgres:5432/audit_db"
    table: "audit_logs"
    # 攒批写入：减少 PG 连接次数，提升吞吐
    batch:
      max_events: 50
      timeout_secs: 1
    # ── 磁盘容灾缓冲（防止 PG 写入抖动导致 Vector 阻塞/OOM）──────
    buffer:
      type: disk
      max_size: 5368709120  # 5GB 磁盘缓冲上限
      when_full: block       # 满后背压阻塞上游，不丢数据
